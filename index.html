<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrabajaHoy - Portal de Empleo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/views/landing/landing.css" />
    <link rel="stylesheet" href="/views/register-candidate/register-candidate.css" />
    <link rel="stylesheet" href="/views/vacancy-listing/vacancy-listing.css" />
    <link rel="stylesheet" href="/views/candidate-dashboard/candidate-dashboard.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Inter', sans-serif; }
      #app { min-height: 100vh; }

      /* Global Loading Screen - Always centered */
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        z-index: 9999;
        gap: 20px;
      }
      .app-loading__spinner {
        width: 52px;
        height: 52px;
        border: 4px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .app-loading__text {
        color: #6b7280;
        font-size: 15px;
        font-weight: 500;
      }

      /* Global Error Screen */
      .app-error {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        z-index: 9999;
        gap: 16px;
        padding: 20px;
        text-align: center;
      }
      .app-error h2 {
        font-size: 22px;
        color: #111827;
        margin: 0;
      }
      .app-error p {
        color: #6b7280;
        font-size: 15px;
        margin: 0;
        max-width: 400px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-loading">
        <div class="app-loading__spinner"></div>
        <p class="app-loading__text">Cargando TrabajaHoy...</p>
      </div>
    </div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
