name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN permissions to deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Use production API URL (already set in config.js as fallback)
          VITE_API_BASE_URL: https://trabajahoy-backend-production.up.railway.app/api

      - name: Copy 404.html for SPA routing
        run: cp public/404.html dist/404.html

      - name: Copy legacy views to dist
        run: cp -r views dist/views

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
