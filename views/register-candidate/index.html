<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta - Candidato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="register-candidate.css" />
  </head>
  <body>
    <main class="login-page">
      <div class="login-page__logo-container">
        <img
          src="../../src/images/logoPortal.png"
          alt="Logo TrabajaHoy"
          class="login-page__logo"
        />
      </div>
      <div class="login-page__container">
        <header class="login-page__header">
          <h1 class="login-page__title">Crear Cuenta</h1>
          <p class="login-page__subtitle">
            ¿Ya tienes una cuenta?
            <a href="../login/index.html" class="login-page__link"
              >Inicia Sesión</a
            >
          </p>
        </header>

        <form class="login-form">
          <div class="login-form__fields">
            <div class="form-row">
              <div class="form-group">
                <input
                  type="text"
                  class="form-input"
                  placeholder="Nombre Completo"
                  aria-label="Nombre Completo"
                  required
                />
              </div>
              <div class="form-group">
                <input
                  type="text"
                  class="form-input"
                  placeholder="Usuario"
                  aria-label="Usuario"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <input
                type="email"
                class="form-input"
                placeholder="Correo Electrónico"
                aria-label="Correo Electrónico"
                required
              />
            </div>

            <div class="form-group form-group--password">
              <input
                type="password"
                class="form-input"
                placeholder="Contraseña"
                aria-label="Contraseña"
                required
              />
              <button
                type="button"
                class="form-password-toggle"
                aria-label="Mostrar contraseña"
              >
                <svg
                  viewBox="0 0 24 24"
                  width="22"
                  height="22"
                  stroke="currentColor"
                  stroke-width="2"
                  fill="none"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>

            <div class="form-group form-group--password">
              <input
                type="password"
                class="form-input"
                placeholder="Confirma la Contraseña"
                aria-label="Confirma la Contraseña"
                required
              />
              <button
                type="button"
                class="form-password-toggle"
                aria-label="Mostrar contraseña"
              >
                <svg
                  viewBox="0 0 24 24"
                  width="22"
                  height="22"
                  stroke="currentColor"
                  stroke-width="2"
                  fill="none"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>

            <div class="form-group form-group--password">
              <input
                type="text"
                class="form-input"
                placeholder="Confirma la Contraseña"
                aria-label="Confirma la Contraseña"
                required
              />
              <button
                type="button"
                class="form-password-toggle"
                aria-label="Mostrar contraseña"
              >
                <svg
                  viewBox="0 0 24 24"
                  width="22"
                  height="22"
                  stroke="currentColor"
                  stroke-width="2"
                  fill="none"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>

            <div class="form-actions form-actions--start">
              <label class="form-checkbox">
                <input type="checkbox" class="form-checkbox__input" required />
                <span class="form-checkbox__label">
                  He leído y estoy de acuerdo con los
                  <span class="form-link">Terminos y Condiciones</span>
                </span>
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn--primary">
            Crear Cuenta
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>

        <div class="login-social">
          <span class="login-social__divider">o</span>
          <div class="login-social__buttons">
            <button type="button" class="btn btn--social">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="#1877F2">
                <path
                  d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"
                />
              </svg>
              Iniciar Sesión con Facebook
            </button>
            <button type="button" class="btn btn--social">
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="currentColor"
              >
                <path
                  fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                />
                <path
                  fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                />
                <path
                  fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                />
                <path
                  fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                />
              </svg>
              Iniciar Sesión con Google
            </button>
          </div>
        </div>
      </div>

      <a
        href="../register-company/index.html"
        class="btn btn--outline-light login-page__register-company"
      >
        Registra tu empresa aquí
      </a>
    </main>
  </body>
</html>
